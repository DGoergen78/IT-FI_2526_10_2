<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT-FI 10.2</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #eef2f7, #dce7f3);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #1f2937;
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      padding: 48px 64px;
      border-radius: 24px;
      box-shadow: 0 18px 40px rgba(31, 41, 55, 0.15);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.7);
    }

    .logo {
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      font-weight: 800;
      letter-spacing: 0.08em;
      color: #1e3a8a;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .line {
      width: 90px;
      height: 4px;
      background: #3b82f6;
      border-radius: 999px;
      margin: 0 auto 18px;
    }

    .subtitle {
      font-size: 1.1rem;
      color: #4b5563;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">IT-FI 10.2</div>
    <div class="line"></div>
    <p class="subtitle">Fachinformatik · Klasse 10.2</p>
  </main>
</body>
</html>
