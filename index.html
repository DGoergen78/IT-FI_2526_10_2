<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Philosophy</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .quote-container {
            max-width: 600px;
            margin-bottom: 30px;
        }
        #quote {
            font-size: 1.5rem;
            font-style: italic;
            line-height: 1.6;
            min-height: 100px;
        }
        button {
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #ff6b81;
        }
    </style>
</head>
<body>

    <div class="quote-container">
        <p id="quote">Loading wisdom...</p>
    </div>

    <button onclick="getNewQuote()">Another One</button>

    <script>
        const quotes = [
            "If water was beer and I was a duck, I'd swim my way down and drink my way up. But water ain't beer and I ain't a duck, so we take this shot and get messed up.",
            "Give a man a match, and he'll be warm for a few hours. Set a man on fire, and he will be warm for the rest of his life.",
            "The early bird gets the worm, but the second mouse gets the cheese.",
            "I have met required parameters and am now someone else's problem.",
            "Everything happens for a reason. Sometimes the reason is that you're stupid and make bad decisions.",
            "If at first you don't succeed, skydiving is definitely not for you.",
            "Do not take life too seriously. You will never get out of it alive.",
            "The path to inner peace begins with four words: Not my fucking problem.",
            "To do is to be"
        ];

        function getNewQuote() {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            document.getElementById("quote").innerText = quotes[randomIndex];
        }

        getNewQuote();
    </script>

</body>
</html>
